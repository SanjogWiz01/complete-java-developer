<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Your Ride - Cab Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .star-rating {
            font-size: 2rem;
            cursor: pointer;
        }
        .star {
            color: #ccc;
            transition: color 0.2s;
        }
        .star.active, .star:hover {
            color: #ffc107;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-taxi"></i> CabBook</a>
            <a href="/bookings/my-bookings" class="nav-link text-white">My Bookings</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card" style="max-width: 600px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Rate Your Ride</h4>
            </div>
            <div class="card-body">
                <p class="text-muted mb-4">Help us improve by rating your ride experience</p>

                <div class="mb-4">
                    <h5>Trip Summary</h5>
                    <p><strong>From:</strong> <span th:text="${booking.pickupLocation}"></span></p>
                    <p><strong>To:</strong> <span th:text="${booking.dropoffLocation}"></span></p>
                    <p><strong>Driver:</strong> <span th:text="${booking.driver.user.fullName}"></span></p>
                    <p><strong>Cost:</strong> ₹<span th:text="${booking.actualCost}"></span></p>
                </div>

                <hr>

                <form th:action="@{/bookings/{id}/rate(id=${booking.id})}" method="post">
                    <div class="mb-4">
                        <label class="form-label">How would you rate your ride?</label>
                        <div class="star-rating" id="ratingStars">
                            <span class="star" data-value="1"><i class="fas fa-star"></i></span>
                            <span class="star" data-value="2"><i class="fas fa-star"></i></span>
                            <span class="star" data-value="3"><i class="fas fa-star"></i></span>
                            <span class="star" data-value="4"><i class="fas fa-star"></i></span>
                            <span class="star" data-value="5"><i class="fas fa-star"></i></span>
                        </div>
                        <input type="hidden" id="rating" name="rating" value="5">
                    </div>

                    <div class="mb-4">
                        <label for="review" class="form-label">Your Review (Optional)</label>
                        <textarea class="form-control" id="review" name="review" rows="4" placeholder="Share your feedback..."></textarea>
                    </div>

                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                        <a href="/bookings/my-bookings" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success">Submit Rating</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.star').forEach(star => {
            star.addEventListener('click', () => {
                const rating = star.getAttribute('data-value');
                document.getElementById('rating').value = rating;

                document.querySelectorAll('.star').forEach(s => {
                    if (s.getAttribute('data-value') <= rating) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });

        // Initialize with 5 stars
        document.querySelectorAll('.star').forEach(star => {
            star.classList.add('active');
        });
    </script>
</body>
</html>
