<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Rate Ride')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container">
        <div class="app-card auth-box">
            <div class="text-center mb-4">
                <span class="feature-icon"><i class="fa-solid fa-star"></i></span>
                <h1 class="h3 fw-bold">Rate Your Ride</h1>
                <p class="text-muted mb-0">Booking #<span th:text="${booking.id}"></span></p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="mb-4 pb-3 border-bottom">
                <div class="mb-2">
                    <strong th:text="${booking.pickupLocation}"></strong>
                    <i class="fa-solid fa-arrow-right mx-2 text-muted"></i>
                    <strong th:text="${booking.dropoffLocation}"></strong>
                </div>
                <div class="text-muted">
                    <span th:if="${booking.driver != null}" th:text="${booking.driver.user.fullName}"></span>
                    <span th:if="${booking.driver == null}">Driver unavailable</span>
                    <span> - Rs. </span>
                    <span th:text="${booking.actualCost != null ? booking.actualCost : booking.estimatedCost}"></span>
                </div>
            </div>

            <form th:action="@{/bookings/{id}/rate(id=${booking.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-4">
                    <label class="form-label">Rating</label>
                    <div class="star-rating" id="ratingStars">
                        <span class="star active" data-value="1"><i class="fa-solid fa-star"></i></span>
                        <span class="star active" data-value="2"><i class="fa-solid fa-star"></i></span>
                        <span class="star active" data-value="3"><i class="fa-solid fa-star"></i></span>
                        <span class="star active" data-value="4"><i class="fa-solid fa-star"></i></span>
                        <span class="star active" data-value="5"><i class="fa-solid fa-star"></i></span>
                    </div>
                    <input type="hidden" id="rating" name="rating" value="5">
                </div>

                <div class="mb-4">
                    <label for="review" class="form-label">Review</label>
                    <textarea class="form-control" id="review" name="review" rows="4" placeholder="Share feedback about the ride"></textarea>
                </div>

                <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
                    <a href="/bookings/my-bookings" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Submit Rating</button>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
<script>
    document.querySelectorAll(".star").forEach((star) => {
        star.addEventListener("click", () => {
            const rating = star.getAttribute("data-value");
            document.getElementById("rating").value = rating;
            document.querySelectorAll(".star").forEach((item) => {
                item.classList.toggle("active", item.getAttribute("data-value") <= rating);
            });
        });
    });
</script>
</body>
</html>
