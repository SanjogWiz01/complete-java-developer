<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Ride - Cab Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 400px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .booking-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 30px 0;
        }
        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-book {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
        }
        .btn-book:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .estimate-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-taxi"></i> CabBook</a>
            <a class="nav-link text-white" href="/bookings/my-bookings">My Bookings</a>
        </div>
    </nav>

    <div class="container">
        <div class="booking-container">
            <h2 class="mb-4"><i class="fas fa-map-pin"></i> Book Your Ride</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" action="/bookings/create">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="pickupLocation" class="form-label">Pickup Location</label>
                        <input type="text" class="form-control" id="pickupLocation" name="pickupLocation" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="dropoffLocation" class="form-label">Dropoff Location</label>
                        <input type="text" class="form-control" id="dropoffLocation" name="dropoffLocation" required>
                    </div>
                </div>

                <!-- Hidden coordinates -->
                <input type="hidden" id="pickupLatitude" name="pickupLatitude" value="40.7128">
                <input type="hidden" id="pickupLongitude" name="pickupLongitude" value="-74.0060">
                <input type="hidden" id="dropoffLatitude" name="dropoffLatitude" value="40.7580">
                <input type="hidden" id="dropoffLongitude" name="dropoffLongitude" value="-73.9855">

                <div id="map"></div>

                <div class="estimate-box">
                    <h5>Estimate</h5>
                    <p><strong>Distance:</strong> <span id="distance">0</span> km</p>
                    <p><strong>Estimated Duration:</strong> <span id="duration">0</span> minutes</p>
                    <p><strong>Estimated Cost:</strong> ₹<span id="cost">0</span></p>
                </div>

                <button type="submit" class="btn btn-book btn-lg w-100">
                    <i class="fas fa-check"></i> Confirm Booking
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Simple mock calculation - in real app, use actual geocoding
        function calculateEstimate() {
            const distance = 5.2; // Mock distance
            const duration = (distance / 40) * 60; // 40 km/h avg speed
            const cost = 50 + (distance * 15) + (duration * 2);

            document.getElementById('distance').textContent = distance.toFixed(1);
            document.getElementById('duration').textContent = Math.ceil(duration);
            document.getElementById('cost').textContent = cost.toFixed(2);
        }

        calculateEstimate();
    </script>
</body>
</html>
