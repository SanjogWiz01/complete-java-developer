<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('My Bookings')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="page-title">My Bookings</h1>
                <p class="page-kicker">Track ride status, view route details, cancel pending rides, and rate completed trips.</p>
            </div>
            <a href="/bookings/book" class="btn btn-primary align-self-lg-end">
                <i class="fa-solid fa-plus me-2"></i>Book New Ride
            </a>
        </div>

        <div th:if="${param.rated}" class="alert alert-success alert-dismissible fade show" role="alert">
            Rating submitted successfully.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="app-card p-3 mb-4">
            <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-outline-secondary active" data-status-filter="ALL">All</button>
                <button type="button" class="btn btn-outline-secondary" data-status-filter="PENDING">Pending</button>
                <button type="button" class="btn btn-outline-secondary" data-status-filter="ACCEPTED">Accepted</button>
                <button type="button" class="btn btn-outline-secondary" data-status-filter="STARTED">Started</button>
                <button type="button" class="btn btn-outline-secondary" data-status-filter="COMPLETED">Completed</button>
                <button type="button" class="btn btn-outline-secondary" data-status-filter="CANCELLED">Cancelled</button>
            </div>
        </div>

        <div th:if="${bookings.empty}" class="app-card p-5 text-center">
            <i class="fa-solid fa-route fa-3x text-muted mb-3"></i>
            <h4>No bookings yet</h4>
            <p class="text-muted">Create your first ride request from the booking screen.</p>
            <a href="/bookings/book" class="btn btn-primary">Book a Ride</a>
        </div>

        <div class="d-grid gap-3">
            <article th:each="booking : ${bookings}" class="app-card p-4" th:attr="data-booking-status=${booking.status.name()}">
                <div class="row g-3 align-items-start">
                    <div class="col-lg-8">
                        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
                            <span class="status-badge" th:classappend="${'status-' + booking.status.name().toLowerCase()}"
                                  th:text="${booking.status.name()}"></span>
                            <span class="text-muted">Booking #<span th:text="${booking.id}"></span></span>
                        </div>
                        <h5 class="mb-3">
                            <i class="fa-solid fa-location-dot text-danger me-2"></i>
                            <span th:text="${booking.pickupLocation}"></span>
                            <i class="fa-solid fa-arrow-right mx-2 text-muted"></i>
                            <span th:text="${booking.dropoffLocation}"></span>
                        </h5>
                        <div class="row g-2 text-muted">
                            <div class="col-sm-6">
                                <i class="fa-regular fa-calendar me-2"></i>
                                <span th:text="${#temporals.format(booking.createdAt, 'dd MMM yyyy, HH:mm')}"></span>
                            </div>
                            <div class="col-sm-6">
                                <i class="fa-solid fa-car-side me-2"></i>
                                <span th:text="${booking.vehicleType != null ? booking.vehicleType : 'SEDAN'}"></span>
                            </div>
                            <div class="col-sm-6">
                                <i class="fa-solid fa-road me-2"></i>
                                <span th:text="${#numbers.formatDecimal(booking.estimatedDistance, 1, 1)}"></span> km
                            </div>
                            <div class="col-sm-6">
                                <i class="fa-solid fa-wallet me-2"></i>
                                Rs. <span th:text="${booking.actualCost != null ? booking.actualCost : booking.estimatedCost}"></span>
                            </div>
                        </div>
                        <div th:if="${booking.driver != null}" class="mt-3 text-muted">
                            <i class="fa-solid fa-id-badge me-2"></i>
                            <span th:text="${booking.driver.user.fullName}"></span>
                            <span> - </span>
                            <span th:text="${booking.driver.vehicleModel}"></span>
                            <span> - </span>
                            <span th:text="${booking.driver.rating}"></span>/5
                        </div>
                    </div>
                    <div class="col-lg-4 text-lg-end">
                        <a th:href="@{/bookings/{id}(id=${booking.id})}" class="btn btn-outline-primary btn-sm mb-2">
                            <i class="fa-solid fa-eye me-1"></i>Details
                        </a>
                        <button th:if="${booking.status.name() == 'PENDING' || booking.status.name() == 'ACCEPTED'}"
                                type="button" class="btn btn-outline-danger btn-sm mb-2"
                                data-bs-toggle="modal" th:attr="data-bs-target='#cancelModal' + ${booking.id}">
                            <i class="fa-solid fa-ban me-1"></i>Cancel
                        </button>
                        <a th:if="${booking.status.name() == 'COMPLETED' && booking.userRating == 0}"
                           th:href="@{/bookings/{id}/rate(id=${booking.id})}" class="btn btn-warning btn-sm mb-2">
                            <i class="fa-solid fa-star me-1"></i>Rate
                        </a>
                    </div>
                </div>

                <div class="modal fade" th:id="'cancelModal' + ${booking.id}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Cancel Booking #<span th:text="${booking.id}"></span></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <form th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="modal-body">
                                    <label class="form-label">Cancellation Reason</label>
                                    <textarea class="form-control" name="reason" rows="3" required></textarea>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
                                    <button type="submit" class="btn btn-danger">Cancel Booking</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
