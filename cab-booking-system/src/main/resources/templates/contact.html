<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Contact')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
            <div>
                <h1 class="page-title">Contact CabBook</h1>
                <p class="page-kicker">Support and operations channels for riders, drivers, and administrators.</p>
            </div>
            <a href="/bookings/book" class="btn btn-primary align-self-lg-end">
                <i class="fa-solid fa-location-arrow me-2"></i>Book Ride
            </a>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <section class="app-card p-4 h-100">
                    <h4 class="mb-3">Operations Desk</h4>
                    <div class="estimate-row">
                        <span>Email</span>
                        <strong>support@cabbook.com</strong>
                    </div>
                    <div class="estimate-row">
                        <span>Phone</span>
                        <strong>+977-61-555555</strong>
                    </div>
                    <div class="estimate-row">
                        <span>Service Area</span>
                        <strong>Pokhara, Nepal</strong>
                    </div>
                    <div class="estimate-row">
                        <span>Admin Login</span>
                        <strong>admin@example.com</strong>
                    </div>
                </section>
            </div>
            <div class="col-lg-7">
                <section class="app-card p-4">
                    <h4 class="mb-3">Message</h4>
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="5" required></textarea>
                            </div>
                            <div class="col-12 text-end">
                                <button type="submit" class="btn btn-primary">Send Message</button>
                            </div>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
