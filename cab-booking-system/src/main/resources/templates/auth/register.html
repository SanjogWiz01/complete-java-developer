<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register')}"></head>
<body>
<main class="auth-shell">
    <div class="container">
        <div class="app-card auth-box">
            <div class="text-center mb-4">
                <a href="/" class="navbar-brand text-decoration-none d-inline-flex align-items-center gap-2 text-dark">
                    <i class="fa-solid fa-taxi"></i>
                    <span>CabBook</span>
                </a>
                <p class="text-muted mb-0 mt-2">Create your rider account.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

            <form method="post" action="/auth/register">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="row g-3">
                    <div class="col-12">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" name="fullName" required>
                    </div>
                    <div class="col-12">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phoneNumber" required>
                    </div>
                    <div class="col-md-6">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="col-12">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" name="address" placeholder="Pokhara, Nepal" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-4">Create Account</button>
            </form>

            <p class="text-center text-muted mt-4 mb-0">
                Already registered? <a href="/auth/login" class="fw-bold text-decoration-none">Sign in</a>
            </p>
        </div>
    </div>
</main>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
