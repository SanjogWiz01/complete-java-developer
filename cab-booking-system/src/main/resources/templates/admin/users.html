<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Users')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container-fluid px-4">
        <div class="admin-layout">
            <div th:replace="~{layout :: adminSidebar}"></div>

            <div>
                <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="page-title">Users</h1>
                        <p class="page-kicker">Registered riders, drivers, and administrators.</p>
                    </div>
                    <a href="/admin/dashboard" class="btn btn-outline-secondary align-self-lg-end">
                        <i class="fa-solid fa-arrow-left me-2"></i>Dashboard
                    </a>
                </div>

                <section class="app-card p-4">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Role</th>
                                <th>Address</th>
                                <th>Joined</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td>#<span th:text="${user.id}"></span></td>
                                <td th:text="${user.fullName}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.phoneNumber}"></td>
                                <td><span class="badge text-bg-secondary" th:text="${user.role.name()}"></span></td>
                                <td th:text="${user.address}"></td>
                                <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}"></td>
                            </tr>
                            <tr th:if="${users.empty}">
                                <td colspan="7" class="text-center text-muted py-4">No users found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
