<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Driver Detail')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container-fluid px-4">
        <div class="admin-layout">
            <div th:replace="~{layout :: adminSidebar}"></div>

            <div>
                <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="page-title" th:text="${driver.user.fullName}"></h1>
                        <p class="page-kicker" th:text="${driver.vehicleModel + ' - ' + driver.vehicleNumber}"></p>
                    </div>
                    <a href="/admin/drivers" class="btn btn-outline-secondary align-self-lg-end">
                        <i class="fa-solid fa-arrow-left me-2"></i>Drivers
                    </a>
                </div>

                <div th:if="${param.statusUpdated}" class="alert alert-success">Driver status updated.</div>

                <div class="row g-4">
                    <div class="col-lg-4">
                        <section class="app-card p-4">
                            <h4 class="mb-3">Driver Profile</h4>
                            <div class="estimate-row">
                                <span>Email</span>
                                <strong th:text="${driver.user.email}"></strong>
                            </div>
                            <div class="estimate-row">
                                <span>Phone</span>
                                <strong th:text="${driver.user.phoneNumber}"></strong>
                            </div>
                            <div class="estimate-row">
                                <span>License</span>
                                <strong th:text="${driver.licenseNumber}"></strong>
                            </div>
                            <div class="estimate-row">
                                <span>Rating</span>
                                <strong><span th:text="${driver.rating}"></span>/5</strong>
                            </div>
                            <div class="estimate-row">
                                <span>Total Rides</span>
                                <strong th:text="${driver.totalRides}"></strong>
                            </div>

                            <form th:action="@{/admin/drivers/{id}/status(id=${driver.id})}" method="post" class="mt-4">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <label class="form-label">Availability</label>
                                <div class="d-flex gap-2">
                                    <select class="form-select" name="status">
                                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"
                                                th:selected="${driver.status == status}"></option>
                                    </select>
                                    <button type="submit" class="btn btn-primary">Update</button>
                                </div>
                            </form>
                        </section>
                    </div>

                    <div class="col-lg-8">
                        <section class="app-card p-4">
                            <h4 class="mb-3">Ride History</h4>
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Passenger</th>
                                        <th>Route</th>
                                        <th>Status</th>
                                        <th>Fare</th>
                                        <th></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="booking : ${bookings}">
                                        <td>#<span th:text="${booking.id}"></span></td>
                                        <td th:text="${booking.user.fullName}"></td>
                                        <td>
                                            <span th:text="${booking.pickupLocation}"></span>
                                            <i class="fa-solid fa-arrow-right mx-1 text-muted"></i>
                                            <span th:text="${booking.dropoffLocation}"></span>
                                        </td>
                                        <td>
                                            <span class="status-badge" th:classappend="${'status-' + booking.status.name().toLowerCase()}"
                                                  th:text="${booking.status.name()}"></span>
                                        </td>
                                        <td>Rs. <span th:text="${booking.actualCost != null ? booking.actualCost : booking.estimatedCost}"></span></td>
                                        <td class="text-end">
                                            <a th:href="@{/admin/bookings/{id}(id=${booking.id})}" class="btn btn-outline-primary btn-sm">Open</a>
                                        </td>
                                    </tr>
                                    <tr th:if="${bookings.empty}">
                                        <td colspan="6" class="text-center text-muted py-4">No rides assigned to this driver.</td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
