<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Cab Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin: 15px 0;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        .sidebar {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            height: 100%;
        }
        .sidebar a {
            display: block;
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
            color: #333;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .sidebar a:hover {
            background: #667eea;
            color: white;
        }
        .table-responsive {
            border-radius: 10px;
            overflow: hidden;
        }
        .btn-action {
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            margin: 0 2px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="fas fa-taxi"></i> CabBook Admin</a>
            <div>
                <form action="/auth/logout" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="sidebar">
                    <h5 class="mb-3">Admin Menu</h5>
                    <a href="/admin/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a>
                    <a href="/admin/drivers"><i class="fas fa-users"></i> Drivers</a>
                    <a href="/admin/bookings"><i class="fas fa-calendar"></i> Bookings</a>
                    <a href="/admin/users"><i class="fas fa-user-friends"></i> Users</a>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <h2 class="mb-4"><i class="fas fa-chart-line"></i> Dashboard</h2>

                <!-- Stats -->
                <div class="row">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div><i class="fas fa-users" style="font-size: 2rem;"></i></div>
                            <div class="stat-value" th:text="${totalUsers}"></div>
                            <div>Total Users</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div><i class="fas fa-car" style="font-size: 2rem;"></i></div>
                            <div class="stat-value" th:text="${totalDrivers}"></div>
                            <div>Total Drivers</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div><i class="fas fa-clock" style="font-size: 2rem;"></i></div>
                            <div class="stat-value" th:text="${bookings.size()}"></div>
                            <div>Pending Bookings</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Bookings -->
                <div class="card mt-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Recent Pending Bookings</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>User</th>
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Status</th>
                                    <th>Cost</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="booking : ${bookings}">
                                    <td th:text="${booking.id}"></td>
                                    <td th:text="${booking.user.fullName}"></td>
                                    <td th:text="${booking.pickupLocation}"></td>
                                    <td th:text="${booking.dropoffLocation}"></td>
                                    <td>
                                        <span class="badge bg-warning" th:text="${booking.status.name()}"></span>
                                    </td>
                                    <td>₹<span th:text="${booking.estimatedCost}"></span></td>
                                    <td>
                                        <a th:href="@{/admin/bookings/{id}(id=${booking.id})}" class="btn btn-info btn-action btn-sm">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Available Drivers -->
                <div class="card mt-4">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="fas fa-check-circle"></i> Available Drivers</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Name</th>
                                    <th>Vehicle</th>
                                    <th>Rating</th>
                                    <th>Status</th>
                                    <th>Rides</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="driver : ${drivers.stream().filter(d -> d.status.name() == 'AVAILABLE').toList()}">
                                    <td th:text="${driver.user.fullName}"></td>
                                    <td th:text="${driver.vehicleModel}"></td>
                                    <td th:text="${driver.rating} + ' ⭐'"></td>
                                    <td>
                                        <span class="badge bg-success" th:text="${driver.status.name()}"></span>
                                    </td>
                                    <td th:text="${driver.totalRides}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
