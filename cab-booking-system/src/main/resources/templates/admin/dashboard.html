<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Admin Dashboard')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container-fluid px-4">
        <div class="admin-layout">
            <div th:replace="~{layout :: adminSidebar}"></div>

            <div>
                <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="page-title">Admin Dashboard</h1>
                        <p class="page-kicker">Booking workload, driver availability, and revenue overview.</p>
                    </div>
                    <a href="/admin/bookings" class="btn btn-primary align-self-lg-end">
                        <i class="fa-solid fa-route me-2"></i>Manage Bookings
                    </a>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6 col-xl-3">
                        <section class="app-card stat-card">
                            <i class="fa-solid fa-users fa-lg mb-3"></i>
                            <div class="metric-value" th:text="${totalUsers}"></div>
                            <div class="metric-label">Users</div>
                        </section>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <section class="app-card stat-card">
                            <i class="fa-solid fa-id-card fa-lg mb-3"></i>
                            <div class="metric-value" th:text="${totalDrivers}"></div>
                            <div class="metric-label">Drivers</div>
                        </section>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <section class="app-card stat-card">
                            <i class="fa-solid fa-hourglass-half fa-lg mb-3"></i>
                            <div class="metric-value" th:text="${pendingBookings}"></div>
                            <div class="metric-label">Pending</div>
                        </section>
                    </div>
                    <div class="col-md-6 col-xl-3">
                        <section class="app-card stat-card">
                            <i class="fa-solid fa-indian-rupee-sign fa-lg mb-3"></i>
                            <div class="metric-value">Rs. <span th:text="${completedRevenue}"></span></div>
                            <div class="metric-label">Completed Revenue</div>
                        </section>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <section class="app-card stat-card">
                            <div class="metric-value" th:text="${activeBookings}"></div>
                            <div class="metric-label">Active rides</div>
                        </section>
                    </div>
                    <div class="col-md-4">
                        <section class="app-card stat-card">
                            <div class="metric-value" th:text="${completedBookings}"></div>
                            <div class="metric-label">Completed rides</div>
                        </section>
                    </div>
                    <div class="col-md-4">
                        <section class="app-card stat-card">
                            <div class="metric-value" th:text="${cancelledBookings}"></div>
                            <div class="metric-label">Cancelled rides</div>
                        </section>
                    </div>
                </div>

                <section class="app-card p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">Recent Bookings</h4>
                        <a href="/admin/bookings" class="btn btn-outline-primary btn-sm">View All</a>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Route</th>
                                <th>Status</th>
                                <th>Fare</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td>#<span th:text="${booking.id}"></span></td>
                                <td th:text="${booking.user.fullName}"></td>
                                <td>
                                    <span th:text="${booking.pickupLocation}"></span>
                                    <i class="fa-solid fa-arrow-right mx-1 text-muted"></i>
                                    <span th:text="${booking.dropoffLocation}"></span>
                                </td>
                                <td>
                                    <span class="status-badge" th:classappend="${'status-' + booking.status.name().toLowerCase()}"
                                          th:text="${booking.status.name()}"></span>
                                </td>
                                <td>Rs. <span th:text="${booking.actualCost != null ? booking.actualCost : booking.estimatedCost}"></span></td>
                                <td class="text-end">
                                    <a th:href="@{/admin/bookings/{id}(id=${booking.id})}" class="btn btn-outline-primary btn-sm">
                                        Open
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${bookings.empty}">
                                <td colspan="6" class="text-center text-muted py-4">No bookings yet.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="app-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">Drivers</h4>
                        <a href="/admin/drivers" class="btn btn-outline-primary btn-sm">Manage</a>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 col-xl-4" th:each="driver : ${drivers}">
                            <div class="border rounded p-3 h-100">
                                <div class="d-flex justify-content-between gap-3">
                                    <strong th:text="${driver.user.fullName}"></strong>
                                    <span class="badge"
                                          th:classappend="${driver.status.name() == 'AVAILABLE' ? 'text-bg-success' : (driver.status.name() == 'BUSY' ? 'text-bg-primary' : 'text-bg-secondary')}"
                                          th:text="${driver.status.name()}"></span>
                                </div>
                                <div class="text-muted mt-2" th:text="${driver.vehicleModel}"></div>
                                <div class="text-muted"><span th:text="${driver.rating}"></span>/5 rating</div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
