<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Bookings')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container-fluid px-4">
        <div class="admin-layout">
            <div th:replace="~{layout :: adminSidebar}"></div>

            <div>
                <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="page-title">Bookings</h1>
                        <p class="page-kicker">Review requests, assign drivers, and control ride status.</p>
                    </div>
                    <form method="get" action="/admin/bookings" class="d-flex gap-2 align-self-lg-end">
                        <select class="form-select" name="status">
                            <option value="">All statuses</option>
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"
                                    th:selected="${selectedStatus == status}"></option>
                        </select>
                        <button type="submit" class="btn btn-primary">Filter</button>
                    </form>
                </div>

                <section class="app-card p-4">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Route</th>
                                <th>Driver</th>
                                <th>Status</th>
                                <th>Fare</th>
                                <th>Created</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="booking : ${bookings}">
                                <td>#<span th:text="${booking.id}"></span></td>
                                <td>
                                    <strong th:text="${booking.user.fullName}"></strong>
                                    <div class="text-muted" th:text="${booking.user.phoneNumber}"></div>
                                </td>
                                <td>
                                    <span th:text="${booking.pickupLocation}"></span>
                                    <i class="fa-solid fa-arrow-right mx-1 text-muted"></i>
                                    <span th:text="${booking.dropoffLocation}"></span>
                                    <div class="text-muted">
                                        <span th:text="${booking.vehicleType != null ? booking.vehicleType : 'SEDAN'}"></span>
                                        <span> - </span>
                                        <span th:text="${#numbers.formatDecimal(booking.estimatedDistance, 1, 1)}"></span> km
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${booking.driver != null}" th:text="${booking.driver.user.fullName}"></span>
                                    <span th:if="${booking.driver == null}" class="text-muted">Unassigned</span>
                                </td>
                                <td>
                                    <span class="status-badge" th:classappend="${'status-' + booking.status.name().toLowerCase()}"
                                          th:text="${booking.status.name()}"></span>
                                </td>
                                <td>Rs. <span th:text="${booking.actualCost != null ? booking.actualCost : booking.estimatedCost}"></span></td>
                                <td th:text="${#temporals.format(booking.createdAt, 'dd MMM HH:mm')}"></td>
                                <td class="text-end">
                                    <a th:href="@{/admin/bookings/{id}(id=${booking.id})}" class="btn btn-outline-primary btn-sm">Open</a>
                                </td>
                            </tr>
                            <tr th:if="${bookings.empty}">
                                <td colspan="8" class="text-center text-muted py-4">No bookings found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
