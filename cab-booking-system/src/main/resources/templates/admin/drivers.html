<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Drivers')}"></head>
<body>
<div th:replace="~{layout :: nav}"></div>

<main class="main-content section-pad">
    <div class="container-fluid px-4">
        <div class="admin-layout">
            <div th:replace="~{layout :: adminSidebar}"></div>

            <div>
                <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 mb-4">
                    <div>
                        <h1 class="page-title">Drivers</h1>
                        <p class="page-kicker">Monitor vehicles, ratings, ride counts, and availability.</p>
                    </div>
                    <a href="/admin/dashboard" class="btn btn-outline-secondary align-self-lg-end">
                        <i class="fa-solid fa-arrow-left me-2"></i>Dashboard
                    </a>
                </div>

                <section class="app-card p-4">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Driver</th>
                                <th>Vehicle</th>
                                <th>License</th>
                                <th>Status</th>
                                <th>Rating</th>
                                <th>Rides</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="driver : ${drivers}">
                                <td>#<span th:text="${driver.id}"></span></td>
                                <td>
                                    <strong th:text="${driver.user.fullName}"></strong>
                                    <div class="text-muted" th:text="${driver.user.phoneNumber}"></div>
                                </td>
                                <td>
                                    <span th:text="${driver.vehicleModel}"></span>
                                    <div class="text-muted">
                                        <span th:text="${driver.vehicleType}"></span>
                                        <span> - </span>
                                        <span th:text="${driver.vehicleNumber}"></span>
                                    </div>
                                </td>
                                <td th:text="${driver.licenseNumber}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${driver.status.name() == 'AVAILABLE' ? 'text-bg-success' : (driver.status.name() == 'BUSY' ? 'text-bg-primary' : 'text-bg-secondary')}"
                                          th:text="${driver.status.name()}"></span>
                                </td>
                                <td><span th:text="${driver.rating}"></span>/5</td>
                                <td th:text="${driver.totalRides}"></td>
                                <td class="text-end">
                                    <a th:href="@{/admin/drivers/{id}(id=${driver.id})}" class="btn btn-outline-primary btn-sm">Open</a>
                                </td>
                            </tr>
                            <tr th:if="${drivers.empty}">
                                <td colspan="8" class="text-center text-muted py-4">No drivers available.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout :: footer}"></div>
<div th:replace="~{layout :: scripts}"></div>
</body>
</html>
