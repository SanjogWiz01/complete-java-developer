<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers Management - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="fas fa-taxi"></i> CabBook Admin</a>
            <form action="/auth/logout" method="post" style="display: inline;">
                <button type="submit" class="btn btn-danger btn-sm">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2 class="mb-4"><i class="fas fa-users"></i> Drivers Management</h2>

                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">All Drivers</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>Vehicle</th>
                                    <th>License</th>
                                    <th>Status</th>
                                    <th>Rating</th>
                                    <th>Rides</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="driver : ${drivers}">
                                    <td th:text="${driver.id}"></td>
                                    <td th:text="${driver.user.fullName}"></td>
                                    <td th:text="${driver.user.phoneNumber}"></td>
                                    <td th:text="${driver.vehicleModel}"></td>
                                    <td th:text="${driver.licenseNumber}"></td>
                                    <td>
                                        <span class="badge" th:classappend="${driver.status.name() == 'AVAILABLE' ? 'bg-success' : 'bg-secondary'}" th:text="${driver.status.name()}"></span>
                                    </td>
                                    <td>
                                        <span th:text="${driver.rating}"></span> ⭐
                                    </td>
                                    <td th:text="${driver.totalRides}"></td>
                                    <td>
                                        <a th:href="@{/admin/drivers/{id}(id=${driver.id})}" class="btn btn-info btn-sm">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <a href="/admin/dashboard" class="btn btn-secondary mt-3">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
