# Application Configuration
spring.application.name=cab-booking-system
server.port=8080

# Local H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:cab_booking_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.cabbooking=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Session Configuration
spring.session.store-type=none
server.servlet.session.timeout=30m

# Seed account configuration. Set password values through environment variables before first run.
cab.admin.email=${CAB_ADMIN_EMAIL:admin@example.com}
cab.admin.password=${CAB_ADMIN_PASSWORD:}
cab.seed.driver.password=${CAB_SEED_DRIVER_PASSWORD:}

# MBB bridge settings
cab.mbb.iot.token=${CAB_MBB_IOT_TOKEN:}
