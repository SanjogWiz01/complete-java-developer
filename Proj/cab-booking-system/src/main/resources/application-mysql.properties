# MySQL profile. Run with: mvn spring-boot:run -Dspring-boot.run.profiles=mysql
spring.datasource.url=${CAB_DB_URL:jdbc:mysql://localhost:3306/cab_booking_db}
spring.datasource.username=${CAB_DB_USERNAME:root}
spring.datasource.password=${CAB_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
