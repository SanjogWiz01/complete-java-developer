# Server Configuration
server.port=8080
spring.application.name=ai-customer-support-chatbot

# H2 Database (In-Memory for Development)
spring.datasource.url=jdbc:h2:mem:chatbotdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.aichatbot=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Application Properties
chatbot.max-session-messages=20
chatbot.escalation-threshold=5
chatbot.name=SupportBot
